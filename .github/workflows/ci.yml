name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx1024m

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Build, test & verify
        run: ./mvnw clean verify -B

      - name: Generate JaCoCo report
        run: ./mvnw jacoco:report -B
        continue-on-error: true

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-manager-jar
          path: target/*.jar
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --load -t task-manager:${{ github.sha }} .

      - name: Run Docker Compose stack
        run: docker compose up -d

      - name: Wait for application to be healthy
        run: |
          for i in {1..30}; do
            if docker compose exec -T app wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health 2>/dev/null; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 5
          done
          echo "Application failed to become healthy"
          docker compose logs app
          exit 1

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Build and start application with Docker Compose
        run: docker compose up -d --build

      - name: Run E2E tests
        run: ./mvnw test -B -De2e.tests.enabled=true
        continue-on-error: true

      - name: Collect Docker logs on failure
        if: failure()
        run: docker compose logs app > docker-logs.txt

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 7

      - name: Stop Docker Compose
        if: always()
        run: docker compose down
