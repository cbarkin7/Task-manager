name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx1024m

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: taskmanager
          MYSQL_USER: taskuser
          MYSQL_PASSWORD: taskpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean verify -B -DskipTests=false

      - name: Run tests
        run: mvn test -B

      - name: Generate JaCoCo report
        run: mvn jacoco:report -B
        continue-on-error: true

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: target/site/jacoco/
          retention-days: 14

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: task-manager-jar
          path: target/*.jar
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --load -t task-manager:${{ github.sha }} .

      - name: Run Docker Compose stack
        run: docker compose up -d

      - name: Wait for application to be healthy
        run: |
          for i in {1..30}; do
            if docker compose exec -T app wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health 2>/dev/null; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 5
          done
          echo "Application failed to become healthy"
          docker compose logs app
          exit 1

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Start application with Docker Compose
        run: docker compose up -d

      - name: Run E2E tests
        run: mvn test -B -De2e.tests.enabled=true
        continue-on-error: true

      - name: Collect Docker logs on failure
        if: failure()
        run: docker compose logs app > docker-logs.txt

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 7

      - name: Stop Docker Compose
        if: always()
        run: docker compose down
